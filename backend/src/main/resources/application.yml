server:
  port: 8080

spring:
  application:
    name: spendwise-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/spendwise}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
